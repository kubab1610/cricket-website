<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatBat - Team Investigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="teams-page">
  <header class="top-bar">
    <img src="images/Logo.png" class="logo" alt="StatBat logo">
    <div class="page-header-title">StatBat | Team Investigation</div>
  </header>

  <nav class="nav-bar">
    <a href="index.html">Home</a>
    <a href="teams.html">Teams</a>
    <a href="players.html">Players</a>
    <a href="leagues.html">Leagues</a>
  </nav>

  <div class="page">
    <div class="container h2h-container">
      <div class="selector-card">
        <div class="selector-stamp">Investigation Intake</div>
        <p class="selector-note">Pull two team files from the archive and compare the evidence side by side.</p>
        <div class="selector-row">
          <label class="selector-field">
            <span class="selector-label">Team File A</span>
            <select id="country1" class="country-select">
              <option value="">Select Country 1</option>
            </select>
          </label>

          <span class="vs-label">VS</span>

          <label class="selector-field">
            <span class="selector-label">Team File B</span>
            <select id="country2" class="country-select">
              <option value="">Select Country 2</option>
            </select>
          </label>

          <button class="search-btn" onclick="fetchH2H()">Compare</button>
        </div>
      </div>

      <div id="loading" style="display:none;">
        <div class="loading">
          <div class="loading-spinner"></div>
          Fetching match data...
        </div>
      </div>

      <div id="error" class="error-msg" style="display:none;"></div>

      <div id="results" style="display:none;"></div>

      <div class="section-heading">Live & Upcoming</div>
      <div id="lu-loading" class="lu-loading">
        <div class="lu-spinner"></div>
        Loading matches...
      </div>
      <div id="lu-list"></div>
    </div>
  </div>

  <script>
    const mockTeamData = {
      India: {
        matches: 152,
        wins: 98,
        losses: 44,
        winRate: "64%",
        avgScore: 168,
        highestScore: 240,
        sixes: 412
      },
      Australia: {
        matches: 148,
        wins: 90,
        losses: 50,
        winRate: "61%",
        avgScore: 164,
        highestScore: 229,
        sixes: 398
      },
      England: {
        matches: 145,
        wins: 88,
        losses: 49,
        winRate: "61%",
        avgScore: 171,
        highestScore: 241,
        sixes: 430
      },
      Pakistan: {
        matches: 143,
        wins: 84,
        losses: 52,
        winRate: "59%",
        avgScore: 160,
        highestScore: 232,
        sixes: 365
      }
    };

    const statDefinitions = [
      { key: "matches", label: "Matches Logged" },
      { key: "wins", label: "Wins" },
      { key: "losses", label: "Losses" },
      { key: "winRate", label: "Win Rate" },
      { key: "avgScore", label: "Average Score" },
      { key: "highestScore", label: "Top Score" },
      { key: "sixes", label: "Sixes" }
    ];

    function getStatValue(team, key) {
      const value = team[key];
      return typeof value === "string" ? parseInt(value, 10) : value;
    }

    function getFlagPath(country) {
      const slug = country.toLowerCase().replace(/\s+/g, "-");
      return `images/flags/${slug}.png`;
    }

    function buildTeamCard(country, team, opponent) {
      const statRows = statDefinitions.map(({ key, label }) => {
        const currentValue = getStatValue(team, key);
        const opponentValue = getStatValue(opponent, key);
        const status =
          currentValue > opponentValue
            ? { className: "is-leading", tag: "Lead" }
            : currentValue < opponentValue
              ? { className: "is-trailing", tag: "Trail" }
              : { className: "is-even", tag: "Even" };

        return `
          <div class="stat-row ${status.className}">
            <span class="stat-label">${label}</span>
            <span class="stat-value">${team[key]}</span>
            <span class="stat-tag">${status.tag}</span>
          </div>
        `;
      }).join("");

      return `
        <div class="team-stat-card">
          <div class="file-tab">Evidence Sheet</div>
          <div class="flag-polaroid">
            <div class="polaroid-tape polaroid-tape-left"></div>
            <div class="polaroid-tape polaroid-tape-right"></div>
            <div class="flag-frame">
              <img
                src="${getFlagPath(country)}"
                alt="${country} flag"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              >
              <div class="flag-placeholder">${country} flag</div>
            </div>
            <div class="flag-caption">Filed under ${country}</div>
          </div>
          <h3>${country}</h3>
          <div class="stat-list">
            ${statRows}
          </div>
        </div>
      `;
    }

    function buildVerdict(country1, team1, country2, team2) {
      let country1Edges = 0;
      let country2Edges = 0;

      statDefinitions.forEach(({ key }) => {
        const team1Value = getStatValue(team1, key);
        const team2Value = getStatValue(team2, key);

        if (team1Value > team2Value) country1Edges += 1;
        if (team2Value > team1Value) country2Edges += 1;
      });

      if (country1Edges > country2Edges) {
        return {
          headline: `${country1} holds the stronger case file.`,
          detail: `${country1} leads ${country2} in ${country1Edges} of ${statDefinitions.length} tracked categories.`
        };
      }

      if (country2Edges > country1Edges) {
        return {
          headline: `${country2} holds the stronger case file.`,
          detail: `${country2} leads ${country1} in ${country2Edges} of ${statDefinitions.length} tracked categories.`
        };
      }

      return {
        headline: "This file stays open. No clear edge yet.",
        detail: `${country1} and ${country2} split the current evidence evenly.`
      };
    }

    function loadCountries() {
      const sel1 = document.getElementById("country1");
      const sel2 = document.getElementById("country2");

      const cricketCountries = ["India", "Australia", "England", "Pakistan"];

      cricketCountries.forEach((country) => {
        const option1 = document.createElement("option");
        option1.value = country;
        option1.textContent = country;
        sel1.appendChild(option1);

        const option2 = document.createElement("option");
        option2.value = country;
        option2.textContent = country;
        sel2.appendChild(option2);
      });

      sel1.value = "India";
      sel2.value = "Australia";
    }

    function fetchH2H() {
      const country1 = document.getElementById("country1").value;
      const country2 = document.getElementById("country2").value;
      const errEl = document.getElementById("error");
      const loadEl = document.getElementById("loading");
      const resEl = document.getElementById("results");

      errEl.style.display = "none";
      resEl.style.display = "none";
      loadEl.style.display = "block";

      if (!country1 || !country2) {
        loadEl.style.display = "none";
        errEl.textContent = "Please select both countries.";
        errEl.style.display = "block";
        return;
      }

      if (country1 === country2) {
        loadEl.style.display = "none";
        errEl.textContent = "Please select two different countries.";
        errEl.style.display = "block";
        return;
      }

      const team1 = mockTeamData[country1];
      const team2 = mockTeamData[country2];

      setTimeout(() => {
        loadEl.style.display = "none";

        if (!team1 || !team2) {
          errEl.textContent = "Mock stats are not available for one or both selected teams yet.";
          errEl.style.display = "block";
          return;
        }

        const verdict = buildVerdict(country1, team1, country2, team2);
        const filedOn = new Date().toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
        const notes = [];

        if (team1.matches > team2.matches) {
          notes.push(`${country1} has played more total matches than ${country2}.`);
        } else if (team2.matches > team1.matches) {
          notes.push(`${country2} has played more total matches than ${country1}.`);
        } else {
          notes.push(`${country1} and ${country2} have played the same number of matches.`);
        }

        if (parseInt(team1.winRate) > parseInt(team2.winRate)) {
          notes.push(`${country1} has the higher win rate.`);
        } else if (parseInt(team2.winRate) > parseInt(team1.winRate)) {
          notes.push(`${country2} has the higher win rate.`);
        } else {
          notes.push(`${country1} and ${country2} have the same win rate.`);
        }

        if (team1.highestScore > team2.highestScore) {
          notes.push(`${country1} has the higher top score.`);
        } else if (team2.highestScore > team1.highestScore) {
          notes.push(`${country2} has the higher top score.`);
        } else {
          notes.push(`${country1} and ${country2} have the same highest score.`);
        }

        notes.push("This comparison uses mock StatBat dossier data while the live stats feed is still under investigation.");

        resEl.innerHTML = `
          <div class="result-card">
            <div class="result-header">
              <div class="file-stamp">Case File</div>
              <div class="result-title">${country1} vs ${country2}</div>
              <div class="file-meta">
                <span>Filed: ${filedOn}</span>
                <span>Status: Mock Dossier</span>
              </div>
            </div>

            <div class="case-summary">
              <div class="case-summary-label">Lead Investigator's Read</div>
              <p>${verdict.headline}</p>
              <span>${verdict.detail}</span>
            </div>

            <div class="comparison-grid">
              ${buildTeamCard(country1, team1, team2)}
              ${buildTeamCard(country2, team2, team1)}
            </div>

            <div class="case-notes">
              <h3>Case Notes</h3>
              <ul>
                ${notes.map((note) => `<li>${note}</li>`).join("")}
              </ul>
            </div>
          </div>
        `;

        resEl.style.display = "block";
      }, 500);
    }

    function loadLiveUpcoming(silent = false) {
      const loadEl = document.getElementById("lu-loading");
      const listEl = document.getElementById("lu-list");

      if (!silent) loadEl.style.display = "block";

      setTimeout(() => {
        loadEl.style.display = "none";
        listEl.innerHTML = '<div class="no-matches-msg">No live/upcoming matches right now.</div>';
      }, 1000);
    }

    loadCountries();
    fetchH2H();
    loadLiveUpcoming();
    setInterval(() => loadLiveUpcoming(true), 45000);
  </script>
</body>
</html>
