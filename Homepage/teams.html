<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatBat - Team Investigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="teams-page">
  <header class="top-bar">
    <img src="images/Logo.png" class="logo" alt="StatBat logo">
    <div class="page-header-title">StatBat | Team Investigation</div>
  </header>

  <nav class="nav-bar">
    <a href="index.html">Home</a>
    <a href="teams.html">Teams</a>
    <a href="players.html">Players</a>
    <a href="leagues.html">Leagues</a>
  </nav>

  <div class="page">
    <div class="container h2h-container">
      <div class="selector-card">
        <div class="selector-stamp">Team Comparison</div>
        <p class="selector-note">Choose two teams to compare.</p>
        <div class="selector-row">
          <label class="selector-field">
            <span class="selector-label">Team A</span>
            <select id="country1" class="country-select">
              <option value="">Select Team A</option>
            </select>
          </label>

          <span class="vs-label">VS</span>

          <label class="selector-field">
            <span class="selector-label">Team B</span>
            <select id="country2" class="country-select">
              <option value="">Select Team B</option>
            </select>
          </label>

          <button class="search-btn" onclick="fetchH2H()">Compare</button>
        </div>
      </div>

      <div id="loading" style="display:none;">
        <div class="loading">
          <div class="loading-spinner"></div>
          Loading comparison...
        </div>
      </div>

      <div id="error" class="error-msg" style="display:none;"></div>

      <div id="results">
        <div class="result-card">
          <div class="result-header">
            <div class="file-stamp">Comparison</div>
            <div id="comparison-title" class="result-title">Team A vs Team B</div>
            <div class="file-meta">
              <span id="comparison-updated">Updated: --</span>
            </div>
          </div>

          <div class="case-summary">
            <div class="case-summary-label">Summary</div>
            <p id="comparison-summary">Select two teams to view the comparison.</p>
          </div>

          <div class="comparison-grid">
            <div class="team-stat-card">
              <div class="file-tab">Team A</div>
              <div class="flag-polaroid">
                <div class="polaroid-tape polaroid-tape-left"></div>
                <div class="polaroid-tape polaroid-tape-right"></div>
                <div class="flag-frame">
                  <img id="team-a-flag" alt="Team A flag" style="display:none;">
                  <div id="team-a-flag-placeholder" class="flag-placeholder" style="display:flex;">Team A flag</div>
                </div>
                <div class="flag-caption">Flag</div>
              </div>
              <h3 id="team-a-name">Team A</h3>
              <div id="team-a-stats" class="stat-list"></div>
            </div>

            <div class="team-stat-card">
              <div class="file-tab">Team B</div>
              <div class="flag-polaroid">
                <div class="polaroid-tape polaroid-tape-left"></div>
                <div class="polaroid-tape polaroid-tape-right"></div>
                <div class="flag-frame">
                  <img id="team-b-flag" alt="Team B flag" style="display:none;">
                  <div id="team-b-flag-placeholder" class="flag-placeholder" style="display:flex;">Team B flag</div>
                </div>
                <div class="flag-caption">Flag</div>
              </div>
              <h3 id="team-b-name">Team B</h3>
              <div id="team-b-stats" class="stat-list"></div>
            </div>
          </div>

          <div class="case-notes">
            <h3>Notes</h3>
            <ul id="case-notes-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TEAM_OPTIONS = ["India", "Australia", "England", "Pakistan"];

    const STAT_DEFINITIONS = [
      { key: "matches", label: "Matches" },
      { key: "wins", label: "Wins" },
      { key: "losses", label: "Losses" },
      { key: "winRate", label: "Win Rate" },
      { key: "avgScore", label: "Average Score" },
      { key: "highestScore", label: "Top Score" },
      { key: "sixes", label: "Sixes" }
    ];

    const PAGE_ELEMENTS = {
      country1: document.getElementById("country1"),
      country2: document.getElementById("country2"),
      loading: document.getElementById("loading"),
      error: document.getElementById("error"),
      comparisonTitle: document.getElementById("comparison-title"),
      comparisonUpdated: document.getElementById("comparison-updated"),
      comparisonSummary: document.getElementById("comparison-summary"),
      teamAName: document.getElementById("team-a-name"),
      teamAFlag: document.getElementById("team-a-flag"),
      teamAFlagPlaceholder: document.getElementById("team-a-flag-placeholder"),
      teamAStats: document.getElementById("team-a-stats"),
      teamBName: document.getElementById("team-b-name"),
      teamBFlag: document.getElementById("team-b-flag"),
      teamBFlagPlaceholder: document.getElementById("team-b-flag-placeholder"),
      teamBStats: document.getElementById("team-b-stats"),
      caseNotesList: document.getElementById("case-notes-list")
    };

    function createEmptyStats() {
      return STAT_DEFINITIONS.reduce((stats, { key }) => {
        stats[key] = null;
        return stats;
      }, {});
    }

    function createDefaultComparison(teamAName = "Team A", teamBName = "Team B") {
      return {
        updatedLabel: "Updated: --",
        summary: "Comparison data will appear here.",
        notes: ["Notes will appear here."],
        teamA: {
          name: teamAName,
          flagSrc: "",
          stats: createEmptyStats()
        },
        teamB: {
          name: teamBName,
          flagSrc: "",
          stats: createEmptyStats()
        }
      };
    }

    function getNumericStatValue(value) {
      if (typeof value === "number") return value;
      if (typeof value === "string") {
        const parsedValue = parseFloat(value);
        return Number.isNaN(parsedValue) ? null : parsedValue;
      }

      return null;
    }

    function getStatStatus(currentValue, opponentValue) {
      if (currentValue === null || opponentValue === null) {
        return { className: "is-even", tag: "--" };
      }

      if (currentValue > opponentValue) {
        return { className: "is-leading", tag: "Lead" };
      }

      if (currentValue < opponentValue) {
        return { className: "is-trailing", tag: "Trail" };
      }

      return { className: "is-even", tag: "Even" };
    }

    function formatStatValue(value) {
      return value ?? "--";
    }

    function renderStats(container, currentStats, opponentStats) {
      container.innerHTML = "";

      STAT_DEFINITIONS.forEach(({ key, label }) => {
        const statRow = document.createElement("div");
        const statLabel = document.createElement("span");
        const statValue = document.createElement("span");
        const statTag = document.createElement("span");
        const currentValue = getNumericStatValue(currentStats[key]);
        const opponentValue = getNumericStatValue(opponentStats[key]);
        const status = getStatStatus(currentValue, opponentValue);

        statRow.className = `stat-row ${status.className}`;
        statLabel.className = "stat-label";
        statValue.className = "stat-value";
        statTag.className = "stat-tag";

        statLabel.textContent = label;
        statValue.textContent = formatStatValue(currentStats[key]);
        statTag.textContent = status.tag;

        statRow.appendChild(statLabel);
        statRow.appendChild(statValue);
        statRow.appendChild(statTag);
        container.appendChild(statRow);
      });
    }

    function renderFlag(imageElement, placeholderElement, teamName, flagSrc) {
      imageElement.style.display = "none";
      imageElement.removeAttribute("src");
      imageElement.alt = `${teamName} flag`;
      placeholderElement.textContent = `${teamName} flag`;
      placeholderElement.style.display = "flex";

      if (!flagSrc) {
        return;
      }

      imageElement.onload = () => {
        imageElement.style.display = "block";
        placeholderElement.style.display = "none";
      };

      imageElement.onerror = () => {
        imageElement.style.display = "none";
        placeholderElement.style.display = "flex";
      };

      imageElement.src = flagSrc;
    }

    function renderNotes(notes) {
      PAGE_ELEMENTS.caseNotesList.innerHTML = "";

      notes.forEach((note) => {
        const noteItem = document.createElement("li");
        noteItem.textContent = note;
        PAGE_ELEMENTS.caseNotesList.appendChild(noteItem);
      });
    }

    // Expected data shape for renderComparison:
    // {
    //   updatedLabel: string, e.g. "Updated: 30-03-2026",
    //   summary: string, e.g. "India has a stronger win rate, while England leads in average score."
    //   notes: string[],  An array of the auto-generated insights, e.g. "India has won 64%.. England has higher average..."
    //   teamA: { name: string, flagSrc: string, stats: object },
    //   teamB: { name: string, flagSrc: string, stats: object }, 
    //   
    //   flagSrc is the path to the flag image like images/flags/england.png
    //   stats is the literal statistics of the team. As can be seen in the function STAT_DEFINITIONS.
    //   
    // }
    function renderComparison(comparisonData) {
      const data = comparisonData || createDefaultComparison();

      PAGE_ELEMENTS.comparisonTitle.textContent = `${data.teamA.name} vs ${data.teamB.name}`;
      PAGE_ELEMENTS.comparisonUpdated.textContent = data.updatedLabel || "Updated: --";
      PAGE_ELEMENTS.comparisonSummary.textContent = data.summary || "Comparison summary unavailable.";
      PAGE_ELEMENTS.teamAName.textContent = data.teamA.name;
      PAGE_ELEMENTS.teamBName.textContent = data.teamB.name;

      renderFlag(
        PAGE_ELEMENTS.teamAFlag,
        PAGE_ELEMENTS.teamAFlagPlaceholder,
        data.teamA.name,
        data.teamA.flagSrc
      );
      renderFlag(
        PAGE_ELEMENTS.teamBFlag,
        PAGE_ELEMENTS.teamBFlagPlaceholder,
        data.teamB.name,
        data.teamB.flagSrc
      );

      renderStats(
        PAGE_ELEMENTS.teamAStats,
        data.teamA.stats || createEmptyStats(),
        data.teamB.stats || createEmptyStats()
      );
      renderStats(
        PAGE_ELEMENTS.teamBStats,
        data.teamB.stats || createEmptyStats(),
        data.teamA.stats || createEmptyStats()
      );
      renderNotes(data.notes && data.notes.length ? data.notes : ["No notes available."]);
    }

    function loadCountries() {
      TEAM_OPTIONS.forEach((teamName) => {
        const optionA = document.createElement("option");
        const optionB = document.createElement("option");

        optionA.value = teamName;
        optionA.textContent = teamName;
        optionB.value = teamName;
        optionB.textContent = teamName;

        PAGE_ELEMENTS.country1.appendChild(optionA);
        PAGE_ELEMENTS.country2.appendChild(optionB);
      });

      PAGE_ELEMENTS.country1.value = "India";
      PAGE_ELEMENTS.country2.value = "Australia";
    }

    async function fetchH2H() {
      const teamAName = PAGE_ELEMENTS.country1.value;
      const teamBName = PAGE_ELEMENTS.country2.value;

      PAGE_ELEMENTS.error.style.display = "none";

      if (!teamAName || !teamBName) {
        PAGE_ELEMENTS.error.textContent = "Please select both teams.";
        PAGE_ELEMENTS.error.style.display = "block";
        return;
      }

      if (teamAName === teamBName) {
        PAGE_ELEMENTS.error.textContent = "Please select two different teams.";
        PAGE_ELEMENTS.error.style.display = "block";
        return;
      }

      PAGE_ELEMENTS.loading.style.display = "block";

      try {
        // Replace this placeholder with an API request that returns the shape used by renderComparison(data).
        const comparisonData = await Promise.resolve(createDefaultComparison(teamAName, teamBName));
        renderComparison(comparisonData);
      } catch (error) {
        PAGE_ELEMENTS.error.textContent = error.message || "Unable to load comparison data.";
        PAGE_ELEMENTS.error.style.display = "block";
      } finally {
        PAGE_ELEMENTS.loading.style.display = "none";
      }
    }

    loadCountries();
    renderComparison(createDefaultComparison());
    fetchH2H();
  </script>
</body>
</html>
