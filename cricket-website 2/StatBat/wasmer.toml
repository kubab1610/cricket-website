[package]
name = "kubab1610/statbat"
version = "0.1.0"
description = "StatBat cricket website"

[dependencies]
"wasmer/node" = "*"

[[command]]
name = "start"
module = "wasmer/node:node"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["server.js"]

[fs]
"/app" = "."
